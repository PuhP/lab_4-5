{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Статистика по пользователям</h2>
    <table class="table table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>№</th>
                <th>Пользователь</th>
                <th>Количество посещений</th>
            </tr>
        </thead>
        <tbody>
            {% for row in stats %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ row[0] or '' }} {{ row[1] or 'Неаутентифицированный пользователь' }}</td>
                <td>{{ row[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('logs.view_logs') }}" class="btn btn-secondary">Назад к журналу</a>
</div>
{% endblock %}
