{% macro user_form(roles, user=None, is_edit=False) %}
<form method="POST">
    {% if not is_edit %}
    <div class="mb-3">
        <label class="form-label">Логин</label>
        <input type="text" name="login" class="form-control" value="{{ request.form.get('login', '') }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    {% endif %}

    <div class="mb-3">
        <label class="form-label">Фамилия</label>
        <input type="text" name="last_name" class="form-control" value="{{ user.last_name if user else request.form.get('last_name', '') }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Имя</label>
        <input type="text" name="first_name" class="form-control" value="{{ user.first_name if user else request.form.get('first_name', '') }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Отчество</label>
        <input type="text" name="middle_name" class="form-control" value="{{ user.middle_name if user else request.form.get('middle_name', '') }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Роль</label>
        <select name="role_id" class="form-select">
            <option value="">Без роли</option>
            {% for role in roles %}
            <option value="{{ role.id }}" {% if user and user.role_id == role.id %}selected{% endif %}>{{ role.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
</form>
{% endmacro %}
