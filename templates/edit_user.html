{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0">Редактирование пользователя</h3>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('edit_user', user_id=user.id) }}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label">Логин</label>
                            <input type="text" class="form-control" value="{{ user.login }}" readonly disabled>
                            <div class="form-text">Логин изменить нельзя.</div>
                        </div>

                        <div class="mb-3">
                            <label for="last_name" class="form-label">Фамилия</label>
                            <input type="text" name="last_name" id="last_name" class="form-control" 
                                   value="{{ user.last_name or '' }}">
                        </div>

                        <div class="mb-3">
                            <label for="first_name" class="form-label">Имя *</label>
                            <input type="text" name="first_name" id="first_name" class="form-control" 
                                   value="{{ user.first_name }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="middle_name" class="form-label">Отчество</label>
                            <input type="text" name="middle_name" id="middle_name" class="form-control" 
                                   value="{{ user.middle_name or '' }}">
                        </div>

                        <div class="mb-3">
                            <label for="role_id" class="form-label">Роль</label>
                            <select name="role_id" id="role_id" class="form-select" 
                                {% if current_user.role.name != 'Администратор' %} disabled {% endif %}>
                                {% for role in roles %}
                                    <option value="{{ role.id }}" {% if user.role_id == role.id %} selected {% endif %}>
                                        {{ role.name }}
                                    </option>
                                {% endfor %}
                            </select>
                            {% if current_user.role.name != 'Администратор' %}
                                <div class="form-text text-danger">У вас нет прав для изменения роли.</div>
                                {# Скрытое поле, чтобы значение не потерялось при отправке формы #}
                                <input type="hidden" name="role_id" value="{{ user.role_id }}">
                            {% endif %}
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
                            <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
